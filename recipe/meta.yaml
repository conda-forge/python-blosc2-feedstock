{% set version = "4.8.0" %}

package:
  name: python-blosc2
  version: {{ version }}

source:
  url: https://github.com/Blosc/python-blosc2/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 0e9ae2fa27e940eb5595d6e0736bba9249ee8a7be0d191ca76e67da0704ac4d9

build:
  number: 0
  skip: true  # [py<311]
  script_env:
    - USE_SYSTEM_BLOSC2=1
  script:
    - set CC=clang-cl                      # [win]
    - set CXX=clang-cl                     # [win]
    - set CMAKE_GENERATOR_TOOLSET=ClangCL  # [win]
    # cross-python does not wire up FindPython's NumPy/Development.Module components
    # for free-threaded (cp3xxt) cross builds, so point CMake at them explicitly.
    # NumPy headers are architecture independent, so the build-env copy is fine.
    - export Python_INCLUDE_DIR="$(python -c 'import sysconfig; print(sysconfig.get_path("include"))')"   # [build_platform != target_platform]
    - export Python_NumPy_INCLUDE_DIR="$(python -c 'import numpy; print(numpy.get_include())')"           # [build_platform != target_platform]
    - export CMAKE_ARGS="${CMAKE_ARGS} -DPython_EXECUTABLE=${PYTHON} -DPython_INCLUDE_DIR=${Python_INCLUDE_DIR} -DPython_NumPy_INCLUDE_DIR=${Python_NumPy_INCLUDE_DIR}"     # [build_platform != target_platform]
    - export CMAKE_ARGS="${CMAKE_ARGS} -DPython3_EXECUTABLE=${PYTHON} -DPython3_INCLUDE_DIR=${Python_INCLUDE_DIR} -DPython3_NumPy_INCLUDE_DIR=${Python_NumPy_INCLUDE_DIR}"  # [build_platform != target_platform]
    - {{ PYTHON }} -m pip install . -vv

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
    - {{ compiler('cxx') }}
    - clangxx                   # [win]
    - cmake
    - python                              # [build_platform != target_platform]
    - cross-python_{{ target_platform }}  # [build_platform != target_platform]
    - cython                              # [build_platform != target_platform]
    - numpy                               # [build_platform != target_platform]
    - make                                # [unix]
    - ninja
    - pkg-config
  host:
    - c-blosc2
    - cython
    - numpy
    - python
    - python-build
    - pip
    - scikit-build-core
  run:
    - python
    - msgpack-python
    - ndindex
    - numexpr >=2.14.1
    - numpy >=1.26.0
    - pydantic
    - requests
    - threadpoolctl
    - textual
    - textual-plotext
    - rich
    - httpx

test:
  imports:
    - blosc2
  commands:
    - pip list
    - pip check
    - python -c "import blosc2; blosc2.print_versions()"
  requires:
    - pip

about:
  home: https://github.com/Blosc/python-blosc2
  summary: A fast & compressed ndarray library with a flexible computational engine.
  description: |
    Blosc2 is a high-performance compressor optimized for binary and n-dimensional data.
    It adds a flexible computational engine, making it ideal for scientific computing
    and other data-intensive applications.
  license: BSD-3-Clause
  license_family: BSD
  license_file:
    - LICENSE.txt
  doc_url: https://www.blosc.org/python-blosc2
  dev_url: https://github.com/Blosc/python-blosc2

extra:
  recipe-maintainers:
    - hmaarrfk
    - FrancescAlted
    - goanpeca
    - martaiborra
